name: Tests

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools and runtime deps
        # Full runtime deps so mypy type-checks against real library stubs
        # (numpy, pandas, scipy, plotly) instead of falling back to Any.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Ruff check
        run: ruff check .

      - name: Mypy strict (whole repo)
        run: mypy .

  pytest:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with coverage gate
        run: |
          pytest --cov=stats --cov=llm --cov-report=term-missing \
                 --cov-fail-under=75 -m "not calibration"

  calibration:
    runs-on: ubuntu-latest
    needs: pytest
    # Only run the slower calibration suite on merges to main, not every PR
    if: github.event_name == 'push'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run calibration suite
        run: pytest -m calibration
