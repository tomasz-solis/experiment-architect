name: Keep Streamlit awake

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: keep-streamlit-awake
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      STREAMLIT_APP_URL: ${{ vars.STREAMLIT_APP_URL }}

    steps:
      - name: Check configuration
        run: |
          if [ -z "${STREAMLIT_APP_URL}" ]; then
            echo "Missing repository variable STREAMLIT_APP_URL."
            echo "Set it to your deployed app URL, for example https://your-app-name.streamlit.app/."
            exit 1
          fi

      - name: Ping Streamlit app
        run: |
          http_code="$(
            curl --location --silent --show-error \
              --output response.html \
              --write-out "%{http_code}" \
              --max-time 45 \
              --retry 2 \
              --retry-delay 5 \
              --user-agent "github-actions-streamlit-keepalive" \
              "${STREAMLIT_APP_URL}"
          )"

          echo "HTTP status: ${http_code}"

          if [ "${http_code}" -ge 400 ]; then
            echo "Streamlit app returned an HTTP error."
            exit 1
          fi

          if grep -Eiq "gone to sleep|get this app back up" response.html; then
            echo "The app appears to be asleep already."
            echo "Wake it manually once in Streamlit Cloud, then this workflow can keep it warm."
            exit 1
          fi

          echo "Streamlit app responded successfully."
